  { xp: 3300, name: "Legendary PM",   icon: "💎" },
  { xp: 4000, name: "Game Loc Master", icon: "🐉" },
];

function getLevel(xp) {
  var l = 0;
  for (var i = LEVELS.length - 1; i >= 0; i--) {
    if (xp >= LEVELS[i].xp) { l = i; break; }
  }
  return l;
}

function getLvlProg(xp) {
  var l = getLevel(xp);
  var c = LEVELS[l].xp;
  var n = l < LEVELS.length - 1 ? LEVELS[l + 1].xp : LEVELS[l].xp + 500;
  return { cur: xp - c, need: n - c, level: l };
}

// Draw up to 3 unique items weighted by proximity to player's current power
function drawLoot(currentPower, owned) {
  var notOwned = EQUIPMENT_POOL.filter(function(e){ return owned.indexOf(e.id) === -1; });
  if (notOwned.length === 0) return [];
  var target = Math.min(currentPower + 2, 10);
  var weighted = notOwned.map(function(e){ return Object.assign({}, e, { w: Math.max(0.1, 1 - Math.abs(e.power - target) * 0.25) }); });
  var total = weighted.reduce(function(s, e){ return s + e.w; }, 0);
  var picks = [];
  var used = {};
  for (var attempt = 0; picks.length < Math.min(3, notOwned.length) && attempt < 200; attempt++) {
    var r = Math.random() * total, cum = 0;
    for (var i = 0; i < weighted.length; i++) {
      cum += weighted[i].w;
      if (cum >= r && !used[weighted[i].id]) {
        picks.push(weighted[i]);
        used[weighted[i].id] = true;
        break;
      }
    }
  }
  return picks;
}

      { title: "Error Models", content: `**MQM (Multidimensional Quality Metrics):**\n→ Categories: Accuracy, Fluency, Terminology, Style, Locale, Design\n→ Severity: Critical, Major, Minor\n\n**PASS/FAIL:** Define threshold before testing starts.\nExample: <2 critical, <5 major per 1K words.`, tip: "Define your error model at kickoff. Not during LQA.", q: { q: "When should you define your LQA pass/fail criteria?", o: ["During LQA testing", "After the first bug report", "At project kickoff", "After delivery"], a: 2 } },

// AUDIO.JS — Web Audio SFX engine
// ═══════════════════════════════════════════════════════════

var audioCtx = null;

function getAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }
  return audioCtx;
}

function beep(f, d, t, v) {
  t = t || "square";
  v = v !== undefined ? v : 0.07;
  try {
    var c = getAudio();
    if (!c) return;
    var o = c.createOscillator(), g = c.createGain();
    o.type = t;
    o.frequency.value = f;
    g.gain.setValueAtTime(v, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + d);
    o.connect(g);
    g.connect(c.destination);
    o.start();
    o.stop(c.currentTime + d);
  } catch(e) {}
}

var SFX = {
  click:   function() { beep(800, 0.06); },

// STORAGE.JS — Save/load, migration, export/import
// ═══════════════════════════════════════════════════════════

// Migrate saves from older versions to current schema
function migrateState(raw) {
  if (!raw) return null;
  var v = raw.v || 1;

  // v1 → v2: add lessonAns, equipment, stars
  if (v < 2) {
    raw.lessonAns = raw.lessonAns || {};
    raw.equipment = raw.equipment || [];
    raw.stars = raw.stars || 0;
    v = 2;
  }

  // v2 → v3: validate equipment ids, add streak if missing
  if (v < 3) {
    raw.equipment = validateEquipment(raw.equipment || []);
    raw.streak = raw.streak || 0;
    v = 3;
  }

  // v3 → v4: stars (number) → medals (array of module indices)
  if (v < 4) {
    var oldStars = raw.stars || 0;
    raw.medals = Array.from({length: oldStars}, function(_,i){return i;});
    delete raw.stars;
    raw.bugHps = raw.bugHps || {};
    v = 4;
  }

  raw.v = SAVE_VERSION;
  return raw;
}

// Remove any equipment IDs that no longer exist in the pool
function validateEquipment(ids) {
  if (!Array.isArray(ids)) return [];
  var valid = EQUIPMENT_POOL.map(function(e){ return e.id; });
  return ids.filter(function(id){ return valid.indexOf(id) !== -1; });
}

var db = {
  load: function() {
    try {
      var r = localStorage.getItem(STORAGE_KEY);
      if (!r) return null;
      var parsed = JSON.parse(r);
      return migrateState(parsed);
    } catch(e) { return null; }
  },
  save: function(d) {
    try {
      d.v = SAVE_VERSION;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
    } catch(e) {}
  }
};

function exportProgress(state) {
  try {
    var data = JSON.stringify(Object.assign({}, state, { v: SAVE_VERSION, exportedAt: new Date().toISOString() }), null, 2);
    var blob = new Blob([data], { type: "application/json" });
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url;
    a.download = "glpm-save-" + new Date().toISOString().slice(0,10) + ".json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) { alert("Export failed: " + e.message); }
}

function importProgress(file, onSuccess, onError) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var raw = JSON.parse(e.target.result);
      var migrated = migrateState(raw);
      if (!migrated) throw new Error("Invalid save file");
      db.save(migrated);
      onSuccess(migrated);
    } catch(err) {
      onError(err.message || "Import failed");
    }
  };
  reader.onerror = function() { onError("File read error"); };
  reader.readAsText(file);
}

// SPRITES.JS — HeroSprite and GoblinSprite pixel-art SVG components
// Depends on: heroColor, heroWeapon, heroArmor (computed in app.js)
// ═══════════════════════════════════════════════════════════

// HeroSprite: color driven by best armor, weapon shown floating beside hero
// Props: size (number), animate (bool), heroColor (string), heroWeapon (obj|null), heroArmor (obj|null)
function HeroSprite({ size, animate, heroColor, heroWeapon, heroArmor }) {
  size = size || 48;
  var s = size, u = s / 16;
  var bodyColor = heroColor || "#39d353";
  var skinColor = "#5cb85c";
  var weaponEmoji = heroWeapon ? heroWeapon.emoji : "✊";
  return (
    <div style={{ position: "relative", width: s, height: s, imageRendering: "pixelated", display: "inline-block", animation: animate ? "float 3s ease-in-out infinite" : "none" }}>
      <svg width={s} height={s} viewBox="0 0 16 16" style={{ imageRendering: "pixelated" }}>
        {/* pointed ear left */}
        <rect x="3" y="2" width="1" height="1" fill={skinColor}/>
        <rect x="4" y="1" width="1" height="2" fill={skinColor}/>
        {/* pointed ear right */}
        <rect x="12" y="2" width="1" height="1" fill={skinColor}/>
        <rect x="11" y="1" width="1" height="2" fill={skinColor}/>
        {/* head */}
        <rect x="5" y="1" width="6" height="5" fill={skinColor}/>
        {/* eyes — bright green elf eyes */}
        <rect x="6" y="3" width="1" height="1" fill="#00ff88"/>
        <rect x="9" y="3" width="1" height="1" fill="#00ff88"/>
        <rect x="6" y="2" width="1" height="1" fill="#1a1a2e"/>
        <rect x="9" y="2" width="1" height="1" fill="#1a1a2e"/>
        {/* eyebrows */}
        <rect x="6" y="1" width="2" height="1" fill="#1a5c2a"/>
        <rect x="9" y="1" width="2" height="1" fill="#1a5c2a"/>
        {/* mouth */}
        <rect x="7" y="4" width="2" height="1" fill="#2d8a4e"/>
        {/* body / armor */}
        <rect x="4" y="6" width="8" height="5" fill={bodyColor}/>
        {/* belt */}
        <rect x="4" y="10" width="8" height="1" fill="#1a5c2a"/>
        {/* left arm */}
        <rect x="2" y="6" width="2" height="4" fill={bodyColor}/>
        {/* right arm */}
        <rect x="12" y="6" width="2" height="4" fill={bodyColor}/>
        {/* hands — green skin */}
        <rect x="2" y="10" width="2" height="1" fill={skinColor}/>
        <rect x="12" y="10" width="2" height="1" fill={skinColor}/>
        {/* legs */}
        <rect x="4" y="11" width="3" height="4" fill="#1a5c2a"/>
        <rect x="9" y="11" width="3" height="4" fill="#1a5c2a"/>
        {/* boots */}
        <rect x="3" y="14" width="4" height="1" fill="#0d3b1e"/>
        <rect x="9" y="14" width="4" height="1" fill="#0d3b1e"/>
        {/* armor detail overlay */}
        {heroArmor && <rect x="6" y="7" width="4" height="3" fill={heroArmor.color} opacity="0.5"/>}
        {heroArmor && <rect x="7" y="8" width="2" height="1" fill={heroArmor.color}/>}
      </svg>
      {/* weapon floating beside */}
      <span style={{ position: "absolute", right: -u * 3, top: u * 4, fontSize: u * 5, lineHeight: 1, filter: "drop-shadow(1px 1px 0 #0d1117)" }}>{weaponEmoji}</span>
    </div>
  );
}

// BugSprite: pixel-art bug enemy. tier 0-4 changes color/spikes/crown as HP grows.
// Props: size, hit, tier (0=weak .. 4=boss-tier)
function BugSprite({ size, hit, tier }) {
  size = size || 40;
  tier = tier || 0;
  var s = size;
  // color escalation per tier
  var bodyColors = ["#3aaa3a","#58a6ff","#e3b341","#f0883e","#f85149"];
  var darkColors  = ["#1a5c1a","#1a4a8a","#8a6a00","#8a3a00","#8a0000"];
  var bc = bodyColors[Math.min(tier, 4)];
  var dc = darkColors[Math.min(tier, 4)];
  return (
    <div style={{
      position: "relative", width: s, height: s,
      imageRendering: "pixelated", display: "inline-block",
      animation: hit ? "shake .3s" : "float 2s ease-in-out infinite",
      filter: hit ? "brightness(3) sepia(1)" : "none",
      transition: "filter .1s"
    }}>
      <svg width={s} height={s} viewBox="0 0 16 16" style={{ imageRendering: "pixelated" }}>
        {/* body */}
        <rect x="5" y="5" width="6" height="6" fill={bc}/>
        {/* head */}
        <rect x="4" y="2" width="8" height="5" fill={bc}/>
        {/* antennae */}
        <rect x="5" y="1" width="1" height="2" fill={dc}/>
        <rect x="10" y="1" width="1" height="2" fill={dc}/>
        <rect x="4" y="1" width="1" height="1" fill={dc}/>
        <rect x="11" y="1" width="1" height="1" fill={dc}/>
        {/* eyes */}
        <rect x="5" y="3" width="2" height="2" fill="#f85149"/>
        <rect x="9" y="3" width="2" height="2" fill="#f85149"/>
        <rect x="6" y="4" width="1" height="1" fill="#fff"/>
        <rect x="10" y="4" width="1" height="1" fill="#fff"/>
        {/* mouth */}
        <rect x="5" y="6" width="6" height="1" fill="#1a1a1a"/>
        <rect x="6" y="6" width="1" height="1" fill="#fff"/>
        <rect x="9" y="6" width="1" height="1" fill="#fff"/>
        {/* 6 legs */}
        <rect x="2" y="6" width="3" height="1" fill={dc}/>
        <rect x="11" y="6" width="3" height="1" fill={dc}/>
        <rect x="2" y="8" width="3" height="1" fill={dc}/>
        <rect x="11" y="8" width="3" height="1" fill={dc}/>
        <rect x="2" y="10" width="3" height="1" fill={dc}/>
        <rect x="11" y="10" width="3" height="1" fill={dc}/>
        {/* claws */}
        <rect x="1" y="6" width="1" height="1" fill={bc}/>
        <rect x="14" y="6" width="1" height="1" fill={bc}/>
        <rect x="1" y="10" width="1" height="1" fill={bc}/>
        <rect x="14" y="10" width="1" height="1" fill={bc}/>
        {/* abdomen */}
        <rect x="5" y="11" width="6" height="3" fill={dc}/>
        <rect x="6" y="12" width="1" height="1" fill={bc}/>
        <rect x="9" y="12" width="1" height="1" fill={bc}/>
        {/* tier 1+: back spikes */}
        {tier >= 1 && <rect x="5" y="4" width="1" height="1" fill="#fff"/>}
        {tier >= 1 && <rect x="10" y="4" width="1" height="1" fill="#fff"/>}
        {tier >= 2 && <rect x="4" y="5" width="1" height="2" fill={bc}/>}
        {tier >= 2 && <rect x="11" y="5" width="1" height="2" fill={bc}/>}
        {/* tier 3+: shoulder armor */}
        {tier >= 3 && <rect x="3" y="5" width="2" height="3" fill={bc}/>}
        {tier >= 3 && <rect x="11" y="5" width="2" height="3" fill={bc}/>}
        {/* tier 4: crown */}
        {tier >= 4 && <rect x="5" y="1" width="1" height="1" fill="#e3b341"/>}
        {tier >= 4 && <rect x="7" y="0" width="2" height="2" fill="#e3b341"/>}
        {tier >= 4 && <rect x="10" y="1" width="1" height="1" fill="#e3b341"/>}
      </svg>
    </div>
  );
}

// ── Keyboard accessibility helper ──────────────────────────
// Wraps a handler so Enter/Space also trigger it (for divs with role="button")
function keyHandler(fn) {
  return function(e) {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); fn(e); }
  };
}

// ── Error Boundary ──────────────────────────────────────────
class ErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { hasError: false, error: null };
  }
  static getDerivedStateFromError(error) {
    return { hasError: true, error: error };
  }
  componentDidCatch(error, info) {
    console.error("App crashed:", error, info);
  }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ background: "#0d1117", minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24, gap: 16 }}>
          <div style={{ fontSize: 48 }}>💀</div>
          <h1 className="f" style={{ fontSize: 16, color: "#f85149", textAlign: "center" }}>CRITICAL ERROR</h1>
          <p className="f" style={{ fontSize: 10, color: "#9eaab8", textAlign: "center", maxWidth: 320, lineHeight: 2 }}>
            {this.state.error ? this.state.error.message : "Unknown error"}
          </p>
          <button className="b" onClick={() => { this.setState({ hasError: false, error: null }); }} style={{ background: "#f85149", color: "#fff", borderColor: "#f85149" }}>
            RETRY
          </button>
          <button className="b" onClick={() => { try { localStorage.removeItem(STORAGE_KEY); } catch(e){} window.location.reload(); }} style={{ fontSize: 10, color: "#555d66", borderColor: "#555d66" }}>
            CLEAR SAVE & RELOAD
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

// ── XP Bar ──────────────────────────────────────────────────
// Props: lp (level progress obj), w (width px)
function XPBar({ lp, w }) {
  w = w || 90;
  var pct = Math.min((lp.cur / lp.need) * 100, 100);
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
      <div style={{ width: w, height: 8, background: "#161b22", border: "2px solid #555d66", boxShadow: "inset 0 1px 3px rgba(0,0,0,.4)" }}>
        <div style={{ height: "100%", background: "linear-gradient(90deg,#3fb950,#58a6ff,#79c0ff)", width: pct + "%", transition: "width .6s cubic-bezier(.34,1.2,.64,1)", boxShadow: pct > 5 ? "0 0 8px rgba(63,185,80,.5)" : "none" }} />
      </div>
      <span className="f" style={{ fontSize: 10, color: "#9eaab8" }}>{lp.cur}/{lp.need}</span>
    </div>
  );
}

// ── Top Bar ─────────────────────────────────────────────────
// Props: lp, ld, lang, medals, equipment, muted, t, setStats, setMuted, setLang, extra (JSX)
function TopBar({ lp, ld, lang, medals, equipment, muted, t, setStats, setMuted, setLang, extra, sfx }) {
  var heroWeapon = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "weapon"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroArmor = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "armor"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroColor = heroArmor ? heroArmor.color : "#39d353";

  return (
    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "7px 10px", background: "rgba(13,17,23,.92)", borderBottom: "3px solid #30363d", flexWrap: "wrap", gap: 4, backdropFilter: "blur(14px)", boxShadow: "0 2px 24px rgba(0,0,0,.5), 0 1px 0 rgba(88,166,255,.08)", position: "relative", zIndex: 10 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <HeroSprite size={32} heroColor={heroColor} heroWeapon={heroWeapon} heroArmor={heroArmor} />
        <div>
          <div className="f" style={{ fontSize: 9, color: "#79c0ff", textShadow: "0 0 8px rgba(121,192,255,.3)" }}>LV.{lp.level + 1} {ld.name}{medals.length > 0 ? " 🏅" + medals.length : ""}</div>
          <XPBar lp={lp} w={65} />
          {(heroWeapon || heroArmor) && (
            <div style={{ fontSize: 8, color: "#555d66", fontFamily: "monospace", lineHeight: 1.6 }}>
              {heroWeapon ? heroWeapon.emoji : "✊"}{heroArmor ? heroArmor.emoji : ""}
            </div>
          )}
        </div>
      </div>
      <div style={{ display: "flex", gap: 3, flexWrap: "wrap" }}>
        {extra}
        <button className="b" onClick={function(){ setStats(true); }} style={{ fontSize: 11, padding: "4px 6px" }}>📊</button>
        <button className="b" onClick={function(){ sfx(SFX.click); setMuted(!muted); }} style={{ fontSize: 11, padding: "4px 6px" }}>{muted ? t.mute : t.unmute}</button>
      </div>
    </div>
  );
}

// ── Toast ────────────────────────────────────────────────────
function Toast({ toast }) {
  if (!toast) return null;
  return (
    <div style={{ position: "fixed", bottom: 22, left: "50%", transform: "translateX(-50%)", zIndex: 200, animation: "slideUp .35s cubic-bezier(.34,1.2,.64,1)", pointerEvents: "none" }}>
      <div className="f" style={{ fontSize: 13, padding: "9px 20px", background: toast.c, color: "#fff", border: "3px solid " + toast.c, boxShadow: "0 6px 24px rgba(0,0,0,.5), 0 0 16px " + toast.c + "66", textShadow: "0 1px 2px rgba(0,0,0,.5)" }}>{toast.m}</div>
    </div>
  );
}

// ── Level Up Modal ───────────────────────────────────────────
function LvlUpModal({ lvlUp, lang, t, onClose }) {
  if (lvlUp === null) return null;
  return (
    <div style={{ position: "fixed", inset: 0, background: "radial-gradient(circle at 50% 45%,rgba(227,179,65,.1),rgba(0,0,0,.9) 60%)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center" }}
      onClick={onClose} role="dialog" aria-modal="true">
      <div style={{ textAlign: "center", animation: "pop .6s cubic-bezier(.34,1.56,.64,1)", background: "rgba(13,17,23,.95)", border: "3px solid #f0c93e", padding: "32px 40px", boxShadow: "0 0 60px rgba(240,201,62,.2), 0 20px 60px rgba(0,0,0,.6)" }} onClick={function(e){ e.stopPropagation(); }}>
        <div style={{ fontSize: 56, animation: "float 2s infinite", filter: "drop-shadow(0 4px 12px rgba(0,0,0,.4))" }}>{LEVELS[lvlUp].icon}</div>

        <p className="f" style={{ fontSize: 13, color: "#e6edf3", marginTop: 10, lineHeight: 2, textShadow: "0 1px 2px rgba(0,0,0,.5)" }}>LV.{lvlUp + 1} — {LEVELS[lvlUp].name}</p>
        <button className="b" onClick={onClose} style={{ marginTop: 16, background: "linear-gradient(180deg,#f0c93e,#d29922)", color: "#0d1117", borderColor: "#b58900", fontSize: 12, textShadow: "none", boxShadow: "0 4px 16px rgba(240,201,62,.3)" }}>{t.close}</button>
      </div>
    </div>
  );
}

// ── Stats Modal ──────────────────────────────────────────────
function StatsModal({ stats, setStats, xp, lp, ld, lang, t, comp, totalL, qzDone, achs, medals, equipment, resetAll, exportFn, importFn }) {
  if (!stats) return null;

  var heroWeapon = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "weapon"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroArmor = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "armor"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroColor = heroArmor ? heroArmor.color : "#39d353";

  return (
    <div style={{ position: "fixed", inset: 0, background: "radial-gradient(circle at 50% 40%,rgba(22,27,34,.95),rgba(0,0,0,.95) 60%)", zIndex: 250, display: "flex", alignItems: "center", justifyContent: "center", padding: 12 }}
      onClick={function(){ setStats(false); }} role="dialog" aria-modal="true">
      <div className="c sc" style={{ maxWidth: 380, width: "100%", animation: "slideUp .35s cubic-bezier(.34,1.2,.64,1)", maxHeight: "88vh", border: "3px solid #30363d", boxShadow: "0 16px 60px rgba(0,0,0,.7), 0 0 20px rgba(88,166,255,.08)" }}
        onClick={function(e){ e.stopPropagation(); }}>
        <h2 className="f" style={{ fontSize: 14, color: "#79c0ff", marginBottom: 12, textAlign: "center", textShadow: "0 0 12px rgba(121,192,255,.3)", letterSpacing: 1 }}>📊 {t.stats}</h2>

        {/* Hero preview */}
        <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 12, marginBottom: 10, padding: 10, background: "rgba(13,17,23,.8)", border: "2px solid " + heroColor + "44" }}>
          <HeroSprite size={48} animate={true} heroColor={heroColor} heroWeapon={heroWeapon} heroArmor={heroArmor} />
          <div>
            <div className="f" style={{ fontSize: 9, color: heroColor, marginBottom: 4 }}>YOUR HERO</div>
            {heroWeapon && <div className="f" style={{ fontSize: 8, color: heroWeapon.color }}>{heroWeapon.emoji} {heroWeapon.name}</div>}
            {heroArmor  && <div className="f" style={{ fontSize: 8, color: heroArmor.color, marginTop: 2 }}>{heroArmor.emoji} {heroArmor.name}</div>}
            {!heroWeapon && !heroArmor && <div className="f" style={{ fontSize: 8, color: "#555d66" }}>No equipment yet!</div>}
            <div className="f" style={{ fontSize: 9, color: "#e3b341", marginTop: 4 }}>🏅 Boss Medals: {medals.length}/10</div>
          </div>
        </div>

        {/* Star track */}
        <div style={{ display: "flex", gap: 4, justifyContent: "center", marginBottom: 10 }}>
          {BOSS_DATA.map(function(b, i){
            var hasMedal = medals.indexOf(i) !== -1;
            return <div key={i} title={b.name} style={{ fontSize: 14, opacity: hasMedal ? 1 : 0.2, filter: hasMedal ? "drop-shadow(0 0 4px " + b.color + ")" : "none", transition: "all .3s" }}>{hasMedal ? "🏅" : "☆"}</div>;
          })}
        </div>

        {/* Stats grid */}
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 14 }}>
          {[
            { l: t.totalXp, v: xp,                         c: "#e3b341" },
            { l: t.level,   v: (lp.level + 1) + " " + ld.name, c: "#58a6ff" },
            { l: t.lessons, v: comp.length + "/" + totalL,  c: "#39d353" },
            { l: t.quizzes, v: qzDone.length,               c: "#d2a8ff" },
          ].map(function(s, i){
            return (
              <div key={i} style={{ background: "rgba(13,17,23,.9)", padding: 10, border: "2px solid #30363d", textAlign: "center", boxShadow: "inset 0 1px 0 rgba(255,255,255,.02)" }}>
                <div className="f" style={{ fontSize: 10, color: "#9eaab8", marginBottom: 4 }}>{s.l}</div>
                <div className="f" style={{ fontSize: 13, color: s.c, textShadow: "0 0 8px " + s.c + "44" }}>{s.v}</div>
              </div>
            );
          })}
        </div>

        {/* Achievements */}

        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 5, marginBottom: 12 }}>

                <span style={{ fontSize: 18, filter: unlocked ? "drop-shadow(0 0 4px rgba(240,201,62,.4))" : "none" }}>{unlocked ? a.icon : "❓"}</span>

// ── Loot Modal ───────────────────────────────────────────────
function LootModal({ loot, setLoot, setEquipment, sfx, showToast, equipment }) {
  var hoveredS = React.useState(null);
  var hovered = hoveredS[0], setHovered = hoveredS[1];
  if (!loot) return null;

  // compute current best weapon/armor for preview
  var allEquip = equipment || [];
  function previewFor(item) {
    var pool = item ? [...allEquip, item.id] : allEquip;
    var weapon = pool.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
      .filter(Boolean).filter(function(e){ return e.type === "weapon"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
    var armor = pool.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
      .filter(Boolean).filter(function(e){ return e.type === "armor"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
    return { weapon: weapon, armor: armor, color: armor ? armor.color : "#39d353" };
  }
  var preview = previewFor(hovered);

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.93)", zIndex: 400, display: "flex", alignItems: "center", justifyContent: "center", padding: 16 }}
      role="dialog" aria-modal="true">
      <div style={{ maxWidth: 440, width: "100%", animation: "pop .4s" }}>
        <div style={{ textAlign: "center", marginBottom: 12 }}>
          <h2 className="f" style={{ fontSize: 14, color: "#e3b341", textShadow: "0 0 12px rgba(227,179,65,.5)" }}>⚔️ LOOT DROP!</h2>
          <p className="f" style={{ fontSize: 9, color: "#9eaab8", marginTop: 6 }}>Hover to preview · click to equip</p>
        </div>

        {/* Hero preview */}
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 14, padding: "12px 0", background: "rgba(22,27,34,.7)", border: "2px solid #21262d", position: "relative" }}>
          <div style={{ animation: "float 3s ease-in-out infinite" }}>
            <HeroSprite size={96} heroColor={preview.color} heroWeapon={preview.weapon} heroArmor={preview.armor} />
          </div>
          <div style={{ position: "absolute", bottom: 6, left: 0, right: 0, textAlign: "center" }}>
            {preview.weapon && <span className="f" style={{ fontSize: 8, color: preview.weapon.color, marginRight: 8 }}>{preview.weapon.emoji} {preview.weapon.name}</span>}
            {preview.armor && <span className="f" style={{ fontSize: 8, color: preview.armor.color }}>{preview.armor.emoji} {preview.armor.name}</span>}
            {!preview.weapon && !preview.armor && <span className="f" style={{ fontSize: 8, color: "#555d66" }}>no gear equipped</span>}
          </div>
        </div>

        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {loot.options.map(function(item){
            return (
              <div key={item.id}
                role="button" tabIndex={0}
                onMouseEnter={function(){ setHovered(item); }}
                onMouseLeave={function(){ setHovered(null); }}
                onClick={function(){
                  setEquipment(function(p){ return [...p, item.id]; });
                  sfx(SFX.achieve);
                  showToast(item.emoji + " " + item.name + " EQUIPPED!", item.color);
                  setLoot(null);
                }}
                onKeyDown={keyHandler(function(){
                  setEquipment(function(p){ return [...p, item.id]; });
                  sfx(SFX.achieve);
                  showToast(item.emoji + " " + item.name + " EQUIPPED!", item.color);
                  setLoot(null);
                })}
                style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", background: hovered === item ? "rgba(30,40,55,.98)" : "rgba(22,27,34,.95)", border: "3px solid " + (hovered === item ? item.color : item.color + "88"), cursor: "pointer", transition: "all .18s", boxShadow: hovered === item ? "0 0 18px " + item.color + "66" : "0 0 6px " + item.color + "22", transform: hovered === item ? "translateY(-3px) scale(1.02)" : "" }}
              >
                <span style={{ fontSize: 30, filter: "drop-shadow(0 0 8px " + item.color + ")" }}>{item.emoji}</span>
                <div style={{ flex: 1 }}>
                  <div className="f" style={{ fontSize: 11, color: item.color }}>{item.name}</div>
                  <div className="f" style={{ fontSize: 8, color: "#9eaab8", marginTop: 3 }}>{item.type.toUpperCase()} · PWR {item.power}</div>
                  <div style={{ display: "flex", alignItems: "center", gap: 4, marginTop: 4 }}>
                    <div style={{ flex: 1, height: 5, background: "#21262d", border: "1px solid #484f58" }}>
                      <div style={{ height: "100%", background: item.color, width: (item.power * 10) + "%", boxShadow: "0 0 6px " + item.color, transition: "width .3s" }} />
                    </div>
                    <span className="f" style={{ fontSize: 7, color: item.color }}>{item.power}/10</span>
                  </div>
                </div>
                <span className="f" style={{ fontSize: 10, color: item.color }}>▶ EQUIP</span>
              </div>
            );
          })}
        </div>
        <div style={{ textAlign: "center", marginTop: 12 }}>
          <button className="b" onClick={function(){ setLoot(null); }} style={{ fontSize: 10, padding: "6px 14px", color: "#555d66", borderColor: "#555d66" }}>SKIP</button>
        </div>
      </div>
    </div>
  );
}

              onMouseEnter={function(e){ e.currentTarget.style.transform = "translateY(-4px) scale(1.03)"; e.currentTarget.style.boxShadow = "0 12px 35px rgba(0,0,0,.4), 0 0 22px " + g.color + "77"; }}

// ── Term Match ───────────────────────────────────────────────
function TermMatch({ fade, lang, t, sfx, trans, setScr, mgSelected, setMgSelected, mgMatches, setMgMatches, setXp, showToast, unlock, achs }) {
  var data = MINIGAMES.termMatch[lang];
  var { useState: useS } = React;
  var shuffledDefs = useS(function(){ return [...data.pairs].sort(function(){ return 0.5 - Math.random(); }); })[0];
  var allMatched = Object.keys(mgMatches).length === data.pairs.length;

  function handleTermClick(i) {
    if (mgMatches[i] !== undefined) return;
    setMgSelected(mgSelected === i ? null : i);
    sfx(SFX.click);
  }

  function handleDefClick(defText) {
    if (mgSelected === null) return;
    var pair = data.pairs[mgSelected];
    if (pair.def === defText) {
      var newMatches = Object.assign({}, mgMatches, { [mgSelected]: true });
      setMgMatches(newMatches);
      sfx(SFX.correct);
      setXp(function(p){ return p + 15; });
      showToast("+15 XP!", "#39d353");
      setMgSelected(null);
      if (Object.keys(newMatches).length === data.pairs.length) {
        unlock("minigame_1");
        setXp(function(p){ return p + 50; });
        setTimeout(function(){ showToast("+50 BONUS!", "#e3b341"); }, 500);
      }
    } else {
      sfx(SFX.wrong);
      showToast(t.wrong, "#f85149");
    }
  }

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "#0d1117", padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 6 }}>
        <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }}>◀ {t.prev}</button>
        <h2 className="f" style={{ fontSize: 14, color: "#58a6ff" }}>📚 {data.title}</h2>
      </div>
      <p className="f" style={{ fontSize: 11, color: "#9eaab8", textAlign: "center", marginBottom: 10 }}>{data.desc}</p>
      <div style={{ maxWidth: 600, margin: "0 auto", display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
        <div>
          {data.pairs.map(function(p, i){
            var isMatched = mgMatches[i] !== undefined;
            var isSelected = mgSelected === i;
            return (
              <div key={i} className={"mg-card" + (isMatched ? " mg-found" : isSelected ? " mg-sel" : "")}
                role="button" tabIndex={0}
                onClick={function(){ handleTermClick(i); }}
                onKeyDown={keyHandler(function(){ handleTermClick(i); })}>
                <span className="f" style={{ fontSize: 12, color: isMatched ? "#39d353" : isSelected ? "#e3b341" : "#58a6ff" }}>{p.term} {isMatched ? "✓" : ""}</span>
              </div>
            );
          })}
        </div>
        <div>
          {shuffledDefs.map(function(p, i){
            var alreadyUsed = Object.entries(mgMatches).some(function(entry){ return data.pairs[entry[0]].def === p.def; });
            return (
              <div key={i} className="mg-card"
                role="button" tabIndex={0}
                onClick={function(){ handleDefClick(p.def); }}
                onKeyDown={keyHandler(function(){ handleDefClick(p.def); })}
                style={{ opacity: alreadyUsed ? 0.3 : 1 }}>
                <span className="f" style={{ fontSize: 10, color: "#e6edf3", lineHeight: 1.8 }}>{p.def}</span>
              </div>
            );
          })}
        </div>
      </div>
      {allMatched && (
        <div style={{ textAlign: "center", marginTop: 16 }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🎉</div>
          <p className="f" style={{ fontSize: 12, color: "#39d353", marginBottom: 12 }}>ALL MATCHED!</p>
          <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }} style={{ background: "#39d353", color: "#0d1117", borderColor: "#2ea043" }}>◀ {t.home}</button>
        </div>
      )}
    </div>
  );
}

// ── Risk Spotter ─────────────────────────────────────────────
function RiskSpot({ fade, lang, t, sfx, trans, setScr, mgFlags, setMgFlags, setXp, showToast, unlock }) {
  var data = MINIGAMES.riskSpotter[lang];
  var allFound = mgFlags.length === data.flags.length;

  function handleFlag(i) {
    if (mgFlags.indexOf(i) !== -1) return;
    var newFlags = [...mgFlags, i];
    setMgFlags(newFlags);
    sfx(SFX.correct);
    setXp(function(p){ return p + 20; });
    showToast(t.found + " +20 XP", "#39d353");
    if (newFlags.length === data.flags.length) {
      unlock("minigame_2");
      setXp(function(p){ return p + 50; });
      setTimeout(function(){ showToast("+50 BONUS!", "#e3b341"); }, 500);
    }
  }

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "#0d1117", padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 6 }}>
        <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }}>◀ {t.prev}</button>
        <h2 className="f" style={{ fontSize: 14, color: "#f85149" }}>🔍 {data.title}</h2>
        <span className="f" style={{ fontSize: 12, color: "#39d353" }}>{mgFlags.length}/{data.flags.length}</span>
      </div>
      <div className="c" style={{ maxWidth: 560, margin: "0 auto 16px", borderColor: "#555d66" }}>
        <p className="f" style={{ fontSize: 11, color: "#e6edf3", lineHeight: 2.2, whiteSpace: "pre-wrap" }}>{data.scenario}</p>
      </div>
      <div style={{ maxWidth: 560, margin: "0 auto" }}>
        <p className="f" style={{ fontSize: 11, color: "#9eaab8", marginBottom: 8 }}>{data.desc}</p>
        {data.flags.map(function(f, i){
          var found = mgFlags.indexOf(i) !== -1;
          return (
            <div key={i} className={"mg-card" + (found ? " mg-found" : "")}
              role="button" tabIndex={0}
              onClick={function(){ handleFlag(i); }}
              onKeyDown={keyHandler(function(){ handleFlag(i); })}
              style={{ cursor: found ? "default" : "pointer" }}>
              <div className="f" style={{ fontSize: 11, color: found ? "#39d353" : "#f85149" }}>{found ? "✓ " : "🚩 "}{f.text}</div>
              {found && <div className="f" style={{ fontSize: 10, color: "#9eaab8", marginTop: 4, lineHeight: 1.8 }}>{f.en}</div>}
            </div>
          );
        })}
        {allFound && (
          <div style={{ textAlign: "center", marginTop: 14 }}>
            <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }} style={{ background: "#39d353", color: "#0d1117", borderColor: "#2ea043" }}>◀ {t.home}</button>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Speed Quiz ───────────────────────────────────────────────
function SpeedQuiz({ fade, lang, t, sfx, trans, setScr, mgTimer, setMgTimer, mgQi, setMgQi, mgScore, setMgScore, mgActive, setMgActive, mgSpeedAns, setMgSpeedAns, setXp, showToast, unlock, achs }) {
  var data = MINIGAMES.speedQuiz[lang];
  var { useEffect: useEff } = React;

  useEff(function() {
    if (!mgActive) return;
    if (mgTimer <= 0) return;
    var iv = setInterval(function(){ setMgTimer(function(p){ return p - 1; }); }, 1000);
    return function(){ clearInterval(iv); };
  }, [mgActive, mgTimer]);

  var done = mgTimer <= 0 || mgQi >= data.questions.length;

  if (done && mgScore >= 8 && achs.indexOf("speed_demon") === -1) {
    unlock("speed_demon");
  }

  function handleAns(ai) {
    if (done || mgSpeedAns[mgQi] !== undefined) return;
    var ok = data.questions[mgQi].a === ai;
    setMgSpeedAns(function(p){ return Object.assign({}, p, { [mgQi]: ok }); });
    if (ok) { setMgScore(function(p){ return p + 1; }); sfx(SFX.correct); setXp(function(p){ return p + 25; }); }
    else { sfx(SFX.wrong); }
    setTimeout(function(){
      if (mgQi + 1 < data.questions.length && mgTimer > 0) setMgQi(function(p){ return p + 1; });
    }, 400);
  }

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "#0d1117", padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 6 }}>
        <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }}>◀ {t.prev}</button>
        <h2 className="f" style={{ fontSize: 14, color: "#e3b341" }}>⏱️ {data.title}</h2>
        <span className="f" style={{ fontSize: 16, color: mgTimer <= 5 ? "#f85149" : "#e3b341", animation: mgTimer <= 5 && mgActive ? "pulse .5s infinite" : "none" }}>{mgTimer}s</span>
      </div>

      {!mgActive && !done && (
        <div style={{ textAlign: "center", marginTop: 40 }}>
          <p className="f" style={{ fontSize: 12, color: "#e6edf3", marginBottom: 16 }}>{data.desc}</p>
          <button className="b" onClick={function(){ setMgActive(true); sfx(SFX.click); }} style={{ background: "#e3b341", color: "#0d1117", borderColor: "#d29922", fontSize: 16, padding: "14px 28px" }}>{t.startG}</button>
        </div>
      )}

      {mgActive && !done && (
        <div style={{ maxWidth: 480, margin: "0 auto" }}>
          <div className="f" style={{ fontSize: 11, color: "#9eaab8", marginBottom: 6 }}>Q{mgQi + 1}/{data.questions.length} — {t.score}: {mgScore}</div>
          <div className="c" style={{ marginBottom: 12 }}>
            <p className="f" style={{ fontSize: 13, color: "#e6edf3", lineHeight: 2 }}>{data.questions[mgQi].q}</p>
          </div>
          {data.questions[mgQi].o.map(function(o, oi){
            var ans = mgSpeedAns[mgQi];
            var st = {};
            if (ans !== undefined) {
              if (oi === data.questions[mgQi].a) st = { borderColor: "#39d353", background: "rgba(57,211,83,.1)" };
              else if (ans === false && oi !== data.questions[mgQi].a) st = { borderColor: "#f85149" };
            }
            return (
              <div key={oi} className="qo" style={st}
                role="button" tabIndex={0}
                onClick={function(){ handleAns(oi); }}
                onKeyDown={keyHandler(function(){ handleAns(oi); })}>
                {String.fromCharCode(65 + oi)}) {o}
              </div>
            );
          })}
        </div>
      )}

      {done && (
        <div style={{ textAlign: "center", marginTop: 30 }}>
          <div style={{ fontSize: 48, marginBottom: 12 }}>{mgScore >= 8 ? "🏆" : mgScore >= 5 ? "⭐" : "💪"}</div>
          <h3 className="f" style={{ fontSize: 18, color: "#e3b341", marginBottom: 8 }}>{t.timeUp}</h3>
          <p className="f" style={{ fontSize: 14, color: "#e6edf3" }}>{t.score}: {mgScore}/{data.questions.length}</p>
          {mgScore >= 8 && <p className="f" style={{ fontSize: 10, color: "#e3b341", marginTop: 6 }}>⚡ SPEED DEMON!</p>}
          <div style={{ display: "flex", gap: 8, justifyContent: "center", marginTop: 16 }}>
            <button className="b" onClick={function(){ setMgTimer(30); setMgQi(0); setMgScore(0); setMgActive(false); setMgSpeedAns({}); sfx(SFX.click); }} style={{ background: "#e3b341", color: "#0d1117", borderColor: "#d29922" }}>↻ RETRY</button>
            <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("games"); }); }}>◀ {t.home}</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Title Screen ─────────────────────────────────────────────
// 8-bit title BGM — returns a stop function
function playTitleBGM() {
  var ctx;
  try { ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) { return function(){}; }
  var stopped = false;
  // Original adventure melody: [freq_hz, beats] — 0 = rest
  var melody = [
    [440,1],[0,1],[440,1],[0,1],[494,1],[0,1],[523,1],[0,1],
    [587,2],[0,1],[523,1],[0,1],[494,2],[0,2],
    [392,1],[0,1],[440,1],[0,1],[494,1],[523,1],[587,2],[0,2],
    [659,1],[0,1],[587,1],[0,1],[523,2],[0,2],
    [784,1],[0,1],[698,1],[0,1],[659,1],[587,1],[523,2],[0,1],[494,1],[0,1],
    [440,2],[0,1],[392,1],[0,1],[440,1],[494,1],[523,2],[0,2],
    [587,1],[659,1],[784,2],[0,1],[880,1],[0,1],[784,2],[0,2],
    [659,1],[523,1],[440,2],[392,2],[440,4],[0,2],
  ];
  var beat = 0.13; // seconds per beat
  var t = ctx.currentTime + 0.05;
  function scheduleLoop() {
    if (stopped) return;
    melody.forEach(function(note) {
      var freq = note[0], dur = note[1] * beat;
      if (freq > 0) {
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = "square";
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0.07, t);
        gain.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.9);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start(t);
        osc.stop(t + dur);
      }
      t += dur;
    });
    // loop after full melody
    var loopDelay = (t - ctx.currentTime) * 1000;
    setTimeout(function() { if (!stopped) scheduleLoop(); }, loopDelay);
  }
  scheduleLoop();
  return function() { stopped = true; try { ctx.close(); } catch(e) {} };
}

function LessonScreen({ fade, lang, t, mi, li, setLi, comp, tip, setTip, lessonAns, combat, heroHp, setHeroHp, bugHps, setBugHps, sfx, trans, setScr, completeLesson, handleLessonQ, fmt, lp, ld, medals, equipment, muted, setStats, setMuted, setLang }) {
  var mod = MODULES[mi], md = mod[lang], les = md.lessons[li], tot = md.lessons.length;
  var k = mi + "-" + li, dn = comp.indexOf(k) !== -1;
  var lq = les.q || null;
  var lqAns = lessonAns[k];
  var lqPassed = lqAns && lqAns.correct;
  var canAdvance = !lq || lqPassed || dn || heroHp === 0 || (lqAns !== undefined);
  // Bug HP = number of questions in this module. Each correct answer = -1 HP.
  // One bug per module, HP persists across all lessons in the module.
  var bugMaxHp = md.lessons.filter(function(l){ return l.q; }).length;
  var lessonsCompInModule = md.lessons.filter(function(_, i){ return comp.indexOf(mi + "-" + i) !== -1; }).length;
  var bugTier = Math.min(4, Math.floor(mi / 2));
  // bugHp lives in App (persistent per module). Initialize once when entering module.
  var bugHp = bugHps[mi] !== undefined ? bugHps[mi] : bugMaxHp;
  function setBugHp(val) {
    setBugHps(function(prev) {
      var next = Object.assign({}, prev);
      var cur = prev[mi] !== undefined ? prev[mi] : bugMaxHp;
      next[mi] = typeof val === "function" ? val(cur) : val;
      return next;
    });
  }
  React.useEffect(function(){
    // Initialize bug HP only once per module (not per lesson)
    if (bugHps[mi] === undefined) {
      setBugHps(function(prev){ var n = Object.assign({}, prev); n[mi] = bugMaxHp; return n; });
    }
  }, [mi]);

  var heroWeapon = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "weapon"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroArmor = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "armor"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroColor = heroArmor ? heroArmor.color : "#39d353";

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "#0d1117", display: "flex", flexDirection: "column" }}>

        extra={<button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("map"); }); }} style={{ fontSize: 11, padding: "4px 6px" }}>◀ {t.home}</button>} />

      {/* Lesson progress dots */}
      <div style={{ display: "flex", justifyContent: "center", gap: 4, padding: "6px 8px" }}>
        {md.lessons.map(function(_, i){
          return (
            <div key={i}
              role="button" tabIndex={0}
              onClick={function(){ setLi(i); setTip(false); }}
              onKeyDown={keyHandler(function(){ setLi(i); setTip(false); })}
              style={{ width: 10, height: 10, cursor: "pointer", background: i === li ? mod.color : comp.indexOf(mi + "-" + i) !== -1 ? "#3fb950" : "#21262d", border: "2px solid " + (i === li ? mod.color : "#555d66"), transition: "all .2s", boxShadow: i === li ? "0 0 8px " + mod.color + "88" : "none" }} />
          );
        })}

            <button className="b" onClick={function(){ setTip(!tip); sfx(SFX.click); }} style={{ color: "#e3b341", borderColor: "#e3b341", fontSize: 11, padding: "5px 9px" }}>
              {tip ? t.tipH : t.tipL}
            </button>

              <div className="tp">

                  }
                  <div className="f" style={{ fontSize: 8, color: bugHp <= 0 ? "#555d66" : ["#39d353","#58a6ff","#e3b341","#f0883e","#f85149"][Math.min(bugTier,4)] }}>

        <button className="b" disabled={li === 0} onClick={function(){ setLi(li - 1); setTip(false); sfx(SFX.click); }}>{t.prev}</button>

          ? <span className="f" style={{ fontSize: 11, color: "#39d353" }}>{t.done}</span>

              {t.next}
            </button>
          : (function(){
              var allLessonsDone = md.lessons.every(function(_, idx){ return comp.indexOf(mi + "-" + idx) !== -1; });
              var hasMedal = medals.indexOf(mi) !== -1;
              var goLabel = allLessonsDone && !hasMedal ? "⚔️ BOSS FIGHT" : allLessonsDone && hasMedal ? "◀ " + t.home : md.quiz.length ? "⚔️ " + t.quiz : "◀ " + t.home;
              return <button className="b" disabled={!canAdvance}
                onClick={function(){
                  if (!canAdvance) return;
                  completeLesson();
                  sfx(SFX.click);
                  if (allLessonsDone && !hasMedal) {
                    trans(function(){ setScr("boss"); });
                  } else if (allLessonsDone && hasMedal) {
                    trans(function(){ setScr("map"); });
                  } else if (md.quiz.length) {
                    trans(function(){ setQzAns({}); setScr("quiz"); });
                  } else {
                    trans(function(){ setScr("map"); });
                  }

                style={{ background: canAdvance ? "#d2a8ff" : "#21262d", color: canAdvance ? "#fff" : "#555d66", borderColor: canAdvance ? "#d2a8ff" : "#555d66", transition: "all .3s", textShadow: canAdvance ? "0 1px 2px rgba(0,0,0,.4)" : "none", boxShadow: canAdvance ? "0 3px 12px rgba(210,168,255,.3)" : "none" }}>
                {goLabel}
              </button>;
            })()
        }
      </div>
    </div>
  );
}

// ── Quiz Screen ──────────────────────────────────────────────
function QuizScreen({ fade, lang, t, mi, comp, qzAns, setQzAns, sfx, trans, setScr, handleQuiz, lp, medals }) {
  var mod = MODULES[mi], md = mod[lang];

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "#0d1117", padding: 12 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 6 }}>
        <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("lesson"); }); }}>{t.prev}</button>
        <h2 className="f" style={{ fontSize: 14, color: mod.color }}>⚔️ {t.quiz}</h2>
        <XPBar lp={lp} w={65} />
      </div>
      <div style={{ maxWidth: 540, margin: "0 auto" }}>
        {md.quiz.map(function(q, qi){
          return (
            <div key={qi} className="c" style={{ marginBottom: 12, animation: "slideUp .3s " + (qi * 0.07) + "s both" }}>
              <p className="f" style={{ fontSize: 12, color: "#e6edf3", lineHeight: 2, marginBottom: 8 }}>{q.q}</p>
              {q.o.map(function(opt, oi){

                var cl = "qo";

                  <div key={oi} className={cl}
                    role="button" tabIndex={ans ? -1 : 0}

          <div className="c" style={{ borderColor: "#e3b341", animation: "slideUp .4s", marginTop: 14 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
              <span style={{ fontSize: 22 }}>🎁</span>
              <h3 className="f" style={{ fontSize: 13, color: "#e3b341" }}>{t.reward}</h3>
            </div>
            <p className="f" style={{ fontSize: 12, color: "#e6edf3", lineHeight: 2.2 }}>{md.deliverable}</p>
            <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("map"); }); }} style={{ marginTop: 10, background: "#e3b341", color: "#0d1117", borderColor: "#d29922" }}>◀ {t.home}</button>
          </div>
        )}
        {allDone && medals.indexOf(mi) === -1 && (
          <div style={{ textAlign: "center", marginTop: 16, animation: "slideUp .5s" }}>
            <button className="b" onClick={function(){ sfx(SFX.click); trans(function(){ setScr("boss"); }); }}
              style={{ fontSize: 13, padding: "12px 24px", background: mod.color, color: "#fff", borderColor: mod.color, animation: "pulse 2s infinite", textShadow: "0 1px 2px rgba(0,0,0,.4)", boxShadow: "0 4px 20px " + mod.color + "66" }}>
              ⚔️ {"BOSS FIGHT"}
            </button>
          </div>
        )}
        {allDone && medals.indexOf(mi) !== -1 && (
          <div className="f" style={{ textAlign: "center", marginTop: 16, fontSize: 10, color: "#f0c93e", animation: "slideUp .5s" }}>🏅 {"MEDAL EARNED"}</div>
        )}
      </div>
    </div>

}

// ── Boss Fight Screen ────────────────────────────────────────
// 5 timed questions per boss. 10 seconds each. All correct = medal for that module.
function BossFight({ mi, lang, t, medals, setMedals, sfx, trans, setQzAns, setScr, equipment, fade }) {
  var bmi = mi;
  var boss = BOSS_DATA[bmi];
  var _phase = React.useState("intro"), phase = _phase[0], setPhase = _phase[1];
  var _qIdx = React.useState(0), qIdx = _qIdx[0], setQIdx = _qIdx[1];
  var _answered = React.useState(null), answered = _answered[0], setAnswered = _answered[1];
  var _locked = React.useState(false), locked = _locked[0], setLocked = _locked[1];
  var _timer = React.useState(10), timer = _timer[0], setTimer = _timer[1];
  var _results = React.useState([]), results = _results[0], setResults = _results[1];
  var _bossAnim = React.useState(false), bossAnim = _bossAnim[0], setBossAnim = _bossAnim[1];
  var timerRef = React.useRef(null);

  var md = MODULES[bmi][lang];
  var bossQs = boss.bossQuiz;

  var totalQ = 5;
  var curQ = qIdx < totalQ ? bossQs[qIdx % bossQs.length] : null;

  var heroWeapon = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "weapon"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroArmor = equipment.map(function(id){ return EQUIPMENT_POOL.find(function(e){ return e.id === id; }); })
    .filter(Boolean).filter(function(e){ return e.type === "armor"; }).sort(function(a,b){ return b.power - a.power; })[0] || null;
  var heroColor = heroArmor ? heroArmor.color : "#39d353";

  // Timer countdown — runs during fight phase, resets per question
  React.useEffect(function() {
    if (phase !== "fight" || locked) return;
    setTimer(10);
    timerRef.current = setInterval(function() {
      setTimer(function(prev) {
        if (prev <= 1) {
          // Time's up — count as wrong
          clearInterval(timerRef.current);
          setLocked(true);
          setAnswered(-1);
          sfx(SFX.wrong);
          setBossAnim(true);
          setTimeout(function() {
            setBossAnim(false);
            setResults(function(r) {
              var nr = [].concat(r, [false]);
              if (nr.length >= totalQ) {
                setPhase("result");
              } else {
                setTimeout(function() { setAnswered(null); setLocked(false); setQIdx(function(q) { return q + 1; }); }, 600);
              }
              return nr;
            });
          }, 500);
          return 0;

    }, 1000);

  }, [qIdx, phase, locked]);

  function handleBossAnswer(oi) {
    if (locked || answered !== null || phase !== "fight") return;
    clearInterval(timerRef.current);
    var ok = oi === curQ.a;
    setAnswered(oi);
    setLocked(true);

    if (ok) {
      sfx(SFX.correct);
      setBossAnim(true);
      setTimeout(function() { setBossAnim(false); }, 300);
    } else {
      sfx(SFX.wrong);
    }

    setTimeout(function() {
      setResults(function(r) {
        var nr = [].concat(r, [ok]);
        if (nr.length >= totalQ) {
          setPhase("result");
        } else {
          setTimeout(function() { setAnswered(null); setLocked(false); setQIdx(function(q) { return q + 1; }); }, 400);
        }
        return nr;
      });
    }, 800);
  }

  var correctCount = results.filter(function(r) { return r; }).length;

  React.useEffect(function() {

      sfx(SFX.levelUp);

    trans(function() { setScr("map"); });
  }

  var timerColor = timer <= 3 ? "#ff7b72" : timer <= 5 ? "#f0c93e" : "#3fb950";
  var timerPct = (timer / 10) * 100;

  return (
    <div className={fade ? "fi" : ""} style={{ minHeight: "100vh", background: "radial-gradient(ellipse at 50% 30%," + boss.color + "18,#0a0e14 60%)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "flex-start", padding: "16px 12px", overflowY: "auto" }}>

          {phase === "intro" ? "⚔️ BOSS FIGHT!" : phase === "result" ? (allCorrect ? "🏆 VICTORY!" : "💀 DEFEATED!") : boss.name.toUpperCase()}
        </h2>
        <div className="f" style={{ fontSize: 9, color: "#9eaab8" }}>MOD {bmi + 1}</div>
      </div>

      {/* Question progress dots */}
      {phase === "fight" && (

          {Array.from({length: totalQ}).map(function(_, i) {
            var done = i < results.length;

          transition: "transform .3s",

          <p className="f" style={{ fontSize: 9, color: "#f0c93e", marginBottom: 14, lineHeight: 2 }}>

          </p>
          <button className="b" onClick={function(){ sfx(SFX.click); setPhase("fight"); }} style={{ background: boss.color, color: "#fff", borderColor: boss.color, fontSize: 13, padding: "12px 28px", textShadow: "0 1px 2px rgba(0,0,0,.4)" }}>⚔️ FIGHT!</button>
        </div>
      )}

      {/* Fight phase — question */}

        <div style={{ width: "100%", maxWidth: 500, animation: "slideUp .3s" }}>
          <div className="c" style={{ marginBottom: 8, borderColor: boss.color + "66" }}>
            <p className="f" style={{ fontSize: 11, color: "#e6edf3", lineHeight: 2 }}>{curQ.q}</p>
          </div>
          {curQ.o.map(function(opt, oi){
            var isCorrect = oi === curQ.a;
            var isChosen = answered === oi;

            var cl = "qo";
            var extraStyle = {};
            if (answered !== null) {

}

    c = c || "#39d353";
    setToast({ m: m, c: c });
    setTimeout(function(){ setToast(null); }, 1800);
  }

  var unlock = useCallback(function(id) {
    if (achs.indexOf(id) !== -1) return;
    var a = ACHIEVEMENTS.find(function(x){ return x.id === id; });
    if (!a) return;
    setAchs(function(p){ return [...p, id]; });
    setXp(function(p){ return p + 75; });
    sfx(SFX.achieve);
    showToast(a.icon + " " + a.name, "#e3b341");
  }, [achs, lang, muted]);

  function trans(cb) {
    setFade(false);
    setTimeout(function(){
      cb();
      requestAnimationFrame(function(){
        requestAnimationFrame(function(){ setFade(true); });
      });
    }, 180);
  }

  // ── Complete lesson ─────────────────────────────────────
  function completeLesson() {
    var k = mi + "-" + li;
    if (comp.indexOf(k) !== -1) return;
    var nc = [...comp, k];
    setComp(nc);
    setXp(function(p){
      var n = p + 25;
      var ol = getLevel(p), nl = getLevel(n);
      if (nl > ol) {
        setTimeout(function(){ setLvlUp(nl); sfx(SFX.levelUp); }, 300);
        if (nl >= 4) unlock("level_5");
      }
      return n;
    });
    sfx(SFX.xp);
    var ns = streak + 1;
    setStreak(ns);
    if (nc.length === 1) unlock("first_lesson");
    if (ns >= 5) unlock("five_streak");
    if (nc.length >= 25) unlock("halfway");
    var md = MODULES[mi][lang];
    if (md.lessons.every(function(_, i){ return nc.indexOf(mi + "-" + i) !== -1; })) {
      setXp(function(p){ return p + 100; });
      sfx(SFX.complete);
      var aid = "mod_" + (mi + 1);
      if (ACHIEVEMENTS.find(function(a){ return a.id === aid; })) unlock(aid);
      if (mi === 9) unlock("all_modules");
    }
  }

  // ── Lesson inline question ──────────────────────────────
  function handleLessonQ(key, ai, correctIdx) {
    if (lessonAns[key] !== undefined) return;
    var ok = ai === correctIdx;
    setLessonAns(function(p){ return Object.assign({}, p, { [key]: { chosen: ai, correct: ok } }); });
    if (ok) {
      setXp(function(p){ return p + 15; });
      sfx(SFX.correct);
      showToast("+15 XP!", "#39d353");
      setCombat("strike");
      setTimeout(function(){ setCombat("hit"); }, 350);
      setTimeout(function(){
        setCombat(null);
        var curPower = equipment.length > 0
          ? Math.max.apply(null, equipment.map(function(id){ var e = EQUIPMENT_POOL.find(function(e){ return e.id === id; }); return e ? e.power : 0; }))
          : 0;
        var options = drawLoot(curPower, equipment);
        if (options.length > 0) setLoot({ options: options, key: key });
      }, 800);
    } else {
      sfx(SFX.wrong);
      setCombat("goblin-strike");
      setTimeout(function(){ setCombat("hero-hit"); }, 350);
      setTimeout(function(){ setCombat(null); }, 700);
      setHeroHp(function(p){ return Math.max(0, p - 1); });
    }
  }

  // ── Quiz question ───────────────────────────────────────
  function handleQuiz(qi, ai) {
    if (qzAns[qi] !== undefined) return;
    var md = MODULES[mi][lang];
    var ok = md.quiz[qi].a === ai;
    var newAns = Object.assign({}, qzAns, { [qi]: { a: ai, ok: ok } });
    setQzAns(newAns);
    if (ok) { setXp(function(p){ return p + 50; }); sfx(SFX.correct); showToast(t.correct); }
    else { sfx(SFX.wrong); showToast(t.wrong, "#f85149"); }
    if (Object.keys(newAns).length === md.quiz.length) {
      if (Object.values(newAns).every(function(a){ return a.ok; })) unlock("quiz_perfect");
      if (qzDone.indexOf(mi) === -1) setQzDone(function(p){ return [...p, mi]; });
    }
  }

  // ── Game Over check ──────────────────────────────────────
  React.useEffect(function() {
    if (heroHp <= 0 && scr === "lesson") {
      sfx(SFX.wrong);
      setTimeout(function() { setGameOver(true); }, 600);
    }
  }, [heroHp]);

  // ── Reset ───────────────────────────────────────────────
  function resetAll(force) {
    if (!force && !confirm(t.resetC)) return;
    setXp(0); setComp([]); setQzDone([]); setAchs([]); setStreak(0);
    setLessonAns({}); setEquipment([]); setMedals([]); setLoot(null);
    setHeroHp(10); setBugHps({});
    setScr("title");
    db.save({ xp: 0, comp: [], qzDone: [], achs: [], lang: lang, muted: muted, streak: 0, lessonAns: {}, equipment: [], medals: [], bugHps: {} });
  }

  // ── Export / Import ─────────────────────────────────────
  function handleExport() {
    exportProgress({ xp: xp, comp: comp, qzDone: qzDone, achs: achs, lang: lang, muted: muted, streak: streak, lessonAns: lessonAns, equipment: equipment, medals: medals });
  }

  function handleImport(file) {
    importProgress(file, function(saved){
      setXp(saved.xp || 0);
      setComp(saved.comp || []);
      setQzDone(saved.qzDone || []);
      setAchs(saved.achs || []);
      setLang(saved.lang || "en");
      setMuted(saved.muted || false);
      setStreak(saved.streak || 0);
      setLessonAns(saved.lessonAns || {});
      setEquipment(validateEquipment(saved.equipment || []));
      setMedals(saved.medals || []);
      showToast("SAVE IMPORTED! ✓", "#39d353");
    }, function(err){
      showToast("Import failed: " + err, "#f85149");
    });
  }

  // ── Rich text formatter ─────────────────────────────────
  function fmt(tx) {
    return tx
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/►/g, '<span style="color:#39d353">►</span>')
      .replace(/→/g, '<span style="color:#f0883e">→</span>')
      .replace(/🚩/g, '<span style="color:#f85149">🚩</span>')
      .replace(/✦/g, '<span style="color:#e3b341">✦</span>')
      .replace(/□/g, '<span style="color:#484f58">□</span>');
  }

  // ── Loading screen ──────────────────────────────────────
  if (!loaded) {
    return (
      <div style={{ background: "#0d1117", minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center" }}>
        <p className="f" style={{ fontSize: 16, color: "#58a6ff" }}>LOADING...</p>
      </div>
    );
  }

  var lp = getLvlProg(xp);
  var ld = LEVELS[lp.level];
  var totalL = MODULES.reduce(function(s, m){ return s + m[lang].lessons.length; }, 0);

  // ── Shared props bundles ────────────────────────────────
  var topProps = { lp: lp, ld: ld, lang: lang, medals: medals, equipment: equipment, muted: muted, t: t, setStats: setStats, setMuted: setMuted, setLang: setLang, sfx: sfx };
  var navProps = { sfx: sfx, trans: trans, setScr: setScr };

  return (
    <div style={{ background: "#0d1117", minHeight: "100vh", position: "relative", overflow: "hidden" }}>
      <style>{APP_CSS}</style>

      {/* Ambient Balatro-style orbs */}
      <div className="orb" style={{ width: 320, height: 320, background: "rgba(88,166,255,.18)", top: "-80px", left: "-80px", animationDelay: "0s" }} />
      <div className="orb" style={{ width: 260, height: 260, background: "rgba(210,168,255,.15)", bottom: "10%", right: "-60px", animationDelay: "-3s" }} />
      <div className="orb" style={{ width: 200, height: 200, background: "rgba(57,211,83,.12)", bottom: "40%", left: "30%", animationDelay: "-5.5s" }} />
      <div className="orb" style={{ width: 180, height: 180, background: "rgba(240,136,62,.1)", top: "55%", left: "-40px", animationDelay: "-1.5s" }} />

      {/* Screens */}
      {scr === "title" && (
        <TitleScreen fade={fade} lang={lang} t={t} comp={comp} xp={xp} lp={lp} ld={ld} medals={medals} sfx={sfx} trans={trans} setScr={setScr} setLang={setLang} equipment={equipment} resetAll={resetAll} />
      )}
      {scr === "map" && (
        <MapScreen fade={fade} lang={lang} t={t} comp={comp} {...topProps} {...navProps} setMi={setMi} setLi={setLi} setTip={setTip} setQzAns={setQzAns} />
      )}
      {scr === "lesson" && (
        <LessonScreen fade={fade} lang={lang} t={t} mi={mi} li={li} setLi={setLi} comp={comp} tip={tip} setTip={setTip} lessonAns={lessonAns} combat={combat} heroHp={heroHp} setHeroHp={setHeroHp} bugHps={bugHps} setBugHps={setBugHps} {...topProps} {...navProps} completeLesson={completeLesson} handleLessonQ={handleLessonQ} fmt={fmt} setQzAns={setQzAns} />
      )}
      {scr === "quiz" && (
        <QuizScreen fade={fade} lang={lang} t={t} mi={mi} comp={comp} qzAns={qzAns} setQzAns={setQzAns} {...navProps} handleQuiz={handleQuiz} lp={lp} medals={medals} />
      )}
      {scr === "games" && (
        <GamesHub fade={fade} lang={lang} t={t} {...topProps} {...navProps} setMgSelected={setMgSelected} setMgMatches={setMgMatches} setMgFlags={setMgFlags} setMgTimer={setMgTimer} setMgQi={setMgQi} setMgScore={setMgScore} setMgActive={setMgActive} setMgSpeedAns={setMgSpeedAns} />
      )}
      {scr === "termMatch" && (
        <TermMatch fade={fade} lang={lang} t={t} sfx={sfx} trans={trans} setScr={setScr} mgSelected={mgSelected} setMgSelected={setMgSelected} mgMatches={mgMatches} setMgMatches={setMgMatches} setXp={setXp} showToast={showToast} unlock={unlock} achs={achs} />
      )}
      {scr === "riskSpot" && (
        <RiskSpot fade={fade} lang={lang} t={t} sfx={sfx} trans={trans} setScr={setScr} mgFlags={mgFlags} setMgFlags={setMgFlags} setXp={setXp} showToast={showToast} unlock={unlock} />
      )}
      {scr === "speedQuiz" && (
        <SpeedQuiz fade={fade} lang={lang} t={t} sfx={sfx} trans={trans} setScr={setScr} mgTimer={mgTimer} setMgTimer={setMgTimer} mgQi={mgQi} setMgQi={setMgQi} mgScore={mgScore} setMgScore={setMgScore} mgActive={mgActive} setMgActive={setMgActive} mgSpeedAns={mgSpeedAns} setMgSpeedAns={setMgSpeedAns} setXp={setXp} showToast={showToast} unlock={unlock} achs={achs} />
      )}
      {scr === "boss" && (
        <BossFight key={"boss-" + mi} mi={mi} lang={lang} t={t} medals={medals} setMedals={setMedals} sfx={sfx} trans={trans} setQzAns={setQzAns} setScr={setScr} equipment={equipment} fade={fade} />
      )}

      {/* Global overlays */}
      <Toast toast={toast} />
      <LvlUpModal lvlUp={lvlUp} lang={lang} t={t} onClose={function(){ setLvlUp(null); }} />
      <StatsModal stats={stats} setStats={setStats} xp={xp} lp={lp} ld={ld} lang={lang} t={t} comp={comp} totalL={totalL} qzDone={qzDone} achs={achs} medals={medals} equipment={equipment} resetAll={resetAll} exportFn={handleExport} importFn={handleImport} />
      <LootModal loot={loot} setLoot={setLoot} setEquipment={setEquipment} sfx={sfx} showToast={showToast} equipment={equipment} />

      {/* Game Over overlay */}
      {gameOver && (
        <div style={{ position: "fixed", inset: 0, zIndex: 9999, background: "rgba(0,0,0,.92)", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", animation: "fadeIn .5s" }}>
          <div style={{ fontSize: 64, marginBottom: 16, animation: "shake .5s, pulse 2s infinite" }}>💀</div>
          <h1 className="f" style={{ fontSize: 28, color: "#f85149", textShadow: "0 0 20px rgba(248,81,73,.6), 0 0 40px rgba(248,81,73,.3)", letterSpacing: 4, marginBottom: 12 }}>GAME OVER</h1>
          <p className="f" style={{ fontSize: 11, color: "#9eaab8", marginBottom: 24, lineHeight: 2 }}>Your elf has fallen. All progress is lost.</p>
          <button className="b" onClick={function(){ sfx(SFX.click); setGameOver(false); resetAll(true); }}
            style={{ fontSize: 14, padding: "14px 32px", background: "linear-gradient(180deg,#f85149,#da3633)", color: "#fff", borderColor: "#b62324", textShadow: "0 1px 2px rgba(0,0,0,.4)", animation: "pulse 2s infinite" }}>
            START OVER
          </button>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════
// MAIN.JS — Entry point: CDN check + mount App
// Must be the last script loaded
// ═══════════════════════════════════════════════════════════

(function() {
  var root = document.getElementById("root");

  // ── CDN failure guard ───────────────────────────────────
  if (typeof React === "undefined" || typeof ReactDOM === "undefined") {
    root.innerHTML = [
      '<div style="background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;font-family:monospace">',
      '<div style="font-size:48px">⚠️</div>',
      '<p style="color:#f85149;font-size:14px;text-align:center">FAILED TO LOAD REACT</p>',
      '<p style="color:#8b949e;font-size:11px;text-align:center;max-width:300px;line-height:1.8">',
      'React CDN failed to load. Please check your internet connection and refresh the page.',
      '</p>',
      '<button onclick="location.reload()" style="font-family:monospace;font-size:12px;padding:10px 20px;background:#58a6ff;color:#0d1117;border:none;cursor:pointer">RELOAD</button>',
      '</div>'
    ].join("");
    return;
  }

  if (typeof Babel === "undefined") {
    root.innerHTML = [
      '<div style="background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;font-family:monospace">',
      '<div style="font-size:48px">⚠️</div>',
      '<p style="color:#f85149;font-size:14px;text-align:center">FAILED TO LOAD BABEL</p>',
      '<p style="color:#8b949e;font-size:11px;text-align:center;max-width:300px;line-height:1.8">',
      'Babel CDN failed to load. Please check your internet connection and refresh.',
      '</p>',
      '<button onclick="location.reload()" style="font-family:monospace;font-size:12px;padding:10px 20px;background:#58a6ff;color:#0d1117;border:none;cursor:pointer">RELOAD</button>',
      '</div>'
    ].join("");
    return;
  }

  // ── Mount ───────────────────────────────────────────────
  try {
    var reactRoot = ReactDOM.createRoot(root);
    reactRoot.render(
      React.createElement(ErrorBoundary, null,
        React.createElement(App, null)
      )
    );
  } catch(e) {
    root.innerHTML = [
      '<div style="background:#0d1117;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:16px;font-family:monospace">',
      '<div style="font-size:48px">💀</div>',
      '<p style="color:#f85149;font-size:14px;text-align:center">MOUNT ERROR</p>',
      '<p style="color:#8b949e;font-size:11px;text-align:center;max-width:320px;line-height:1.8">' + (e.message || e) + '</p>',
      '<button onclick="localStorage.removeItem(\'' + STORAGE_KEY + '\');location.reload()" style="font-family:monospace;font-size:11px;padding:8px 16px;background:#f85149;color:#fff;border:none;cursor:pointer">CLEAR SAVE &amp; RELOAD</button>',
      '</div>'
    ].join("");
  }
})();

</script>
</body>
</html>
