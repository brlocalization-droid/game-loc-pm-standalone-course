  // ═══ MODULE 3: TOOLBOX ═══
  { icon: "🛠️", color: "#58a6ff",

      { title: "CAT Tools", content: `**memoQ** — Industry standard for games. Server for teams. Strong TM/TB.\n**SDL Trados** — Veteran. GroupShare. Big plugin ecosystem.\n**Crowdin/Lokalise** — Cloud-native. Git integration. Great for indie/continuous.\n\n**PM needs:** Create projects, assign tasks, run analyses, manage TMs. Understand match rates — they drive your quotes.`, tip: "Best CAT tool = the one your team knows." },
      { title: "BMS Systems", content: `**TerraSoft** — LSP-specialized. Projects, vendors, invoicing, API.\n**XTRF** — Enterprise. Full automation, portals, analytics.\n**Plunet** — German engineering. Financial tracking, multi-tier.\n\n**CAT** = where translation happens\n**BMS** = where business happens\nGood PMs live in both.`, tip: "Automate everything in the BMS. Admin time saved = quality time gained." },
      { title: "Communication", content: `**Slack/Teams** — Channels per project. Threads. Pin key info.\n**Email** — Formal, client-facing, audit trail.\n**Jira/Asana** — Task tracking, LQA bugs.\n**Confluence/Notion** — Docs, wikis, single source of truth.\n\n**Queries:** Shared sheet. ID/Source/Language/Query/Context/Answer/Status.\nSLA: 24-48h standard, 4h blockers.`, tip: "Never answer a query you're unsure about. Escalate." },
      { title: "Trackers", content: `**Master Tracker** — Task/Language/Assignee/Status/Due. Update DAILY.\n**Delivery Log** — Every file: date, version, language, recipient.\n**Vendor Tracker** — Rates, availability, quality scores, backups.\n**Quality Dashboard** — Errors per 1K words, by vendor, trends.\n**Client Report** — 1 page max. RAG status.`, tip: "A tracker you don't update is worse than none." },
      { title: "Automation", content: `**LV1: Formulas** — VLOOKUP, conditional formatting, pivots. 1h invest, daily payoff.\n**LV2: Power Automate** — Email→Teams, auto-tasks. 2-4h, weekly payoff.\n**LV3: APIs** — BMS→CAT, email parsing. 1-2 days, per-project payoff.\n**LV4: AI** — Claude API for query triage, risk detection. 1 week, transformative.\n\n**Rule:** Automate repetitive, not relational.`, tip: "Start with Level 1. Simplest automation = most impactful." }

      { title: "Sistemas BMS", content: `**TerraSoft** — Para LSPs. Projetos, vendors, faturamento, API.\n**XTRF** — Enterprise. Automação, portais, analytics.\n**Plunet** — Financeiro, multi-tier.\n\n**CAT** = onde tradução acontece\n**BMS** = onde negócio acontece`, tip: "Automatize tudo no BMS." },
      { title: "Comunicação", content: `**Slack/Teams** — Canais por projeto. Threads. Fixe infos.\n**Email** — Formal, client-facing, registro.\n**Jira/Asana** — Tasks, bugs de LQA.\n**Confluence/Notion** — Docs, wikis.\n\n**Queries:** Planilha compartilhada. ID/Fonte/Idioma/Query/Contexto/Resposta/Status.\nSLA: 24-48h padrão, 4h blockers.`, tip: "Nunca responda query sem certeza. Escale." },

      { title: "Automação", content: `**NV1: Fórmulas** — VLOOKUP, formatação, dinâmicas. 1h, retorno diário.\n**NV2: Power Automate** — Email→Teams, tarefas auto. 2-4h, semanal.\n**NV3: APIs** — BMS→CAT, parsing. 1-2 dias, por projeto.\n**NV4: IA** — Claude API, triagem, riscos. 1 sem, transformativo.\n\n**Regra:** Automatize repetitivo, não relacional.`, tip: "Comece pelo Nível 1. O mais simples é o mais impactante." }

  // ═══ MODULE 4: QUOTING ═══
  { icon: "💰", color: "#d2a8ff",
    en: { title: "QUOTING", lessons: [
      { title: "Units", content: `**WORDS** — Universal. Source count = quote basis.\n**CHARACTERS** — CJK languages.\n**MINUTES** — Audio. 1 min ≈ 150-170 words.\n**HOURS/SCREENS** — LQA.\n**IMAGES** — DTP.\n\nQuote in the unit the CLIENT expects.`, tip: "Ask how they've been quoted before." },
      { title: "File Analysis", content: `**CAT analysis shows:** Total words, repetitions, 100% matches, fuzzy (75-99%), no match.\n\n→ 100% ≠ free (20-30% rate for review)\n→ Fuzzy: 70-85% rate\n→ WEIGHTED count = real volume\n\n**Complexity:** Technical=slower, creative=premium, no context=risk buffer.\n\n🚩 No files for analysis = quoting blind.`, tip: "Never quote without your own analysis." },
      { title: "Timeline Math", content: `**Words ÷ capacity = days + review (50-70%) + engineering + 10-20% buffer**\n\n→ Standard: 2,000-2,500/day\n→ Fast: 3,000-4,000\n→ Complex: 1,500-2,000\n→ Review: 4,000-6,000\n\n2 translators ≠ half time (coordination overhead). Rush: +25-50%.`, tip: "Negotiate timeline BEFORE accepting." },
      { title: "Pricing Models", content: `**Per-word** — Rate × weighted × langs. $0.05-0.20 range.\n**Hourly** — LQA, DTP. $25-80.\n**Flat fee** — Fixed scope/price. You absorb scope creep.\n**Retainer** — Monthly for live-service. Overages billed.\n\n**Tiers:** FIGS/PTBR (lower) → CJK/Arabic (higher) → Exotic (highest).`, tip: "Compete on reliability, not price." },
      { title: "Quote Defense", content: `**🚩 Red flags:** Quote by EOD, no files, same rate all langs, refs later, match competitor.\n\n**Defense:**\n► List assumptions and IN/OUT scope\n► "Based on files from [date]"\n► Change order clause\n► 30-day validity\n\n**Margin:** Vendor + PM (10-15%) + Tech (5-10%) + Contingency (5-10%) = 30-45% target.`, tip: "A good quote tells a story." }
    ], quiz: [
      { q: "CJK pricing unit?", o: ["Words", "Characters", "Pages"], a: 1 },
      { q: "Weighted count includes?", o: ["Only new", "TM at discount + new", "Total unadjusted"], a: 1 },
      { q: "Healthy margin?", o: ["10-15%", "30-45%", "50-60%"], a: 1 },
    ], deliverable: "Build Quote Calculator spreadsheet." },
    pt: { title: "ORÇAMENTO", lessons: [
      { title: "Unidades", content: `**PALAVRAS** — Universal. Contagem-fonte = base.\n**CARACTERES** — CJK.\n**MINUTOS** — Áudio. 1 min ≈ 150-170 palavras.\n**HORAS/TELAS** — LQA.\n**IMAGENS** — DTP.\n\nOrce na unidade que o CLIENTE espera.`, tip: "Pergunte como foram orçados antes." },
      { title: "Análise de Arquivos", content: `**Análise CAT:** Total, repetições, 100%, fuzzy (75-99%), no match.\n\n→ 100% ≠ grátis (20-30% tarifa)\n→ Fuzzy: 70-85%\n→ Contagem PONDERADA = volume real\n\n**Complexidade:** Técnico=lento, criativo=premium, sem contexto=buffer.\n\n🚩 Sem arquivos = orçando no escuro.`, tip: "Nunca orce sem sua análise." },
      { title: "Cálculo de Prazo", content: `**Palavras ÷ capacidade = dias + revisão (50-70%) + eng + 10-20% buffer**\n\n→ Padrão: 2.000-2.500/dia\n→ Rápido: 3.000-4.000\n→ Complexo: 1.500-2.000\n→ Revisão: 4.000-6.000\n\n2 tradutores ≠ metade do tempo. Rush: +25-50%.`, tip: "Negocie prazo ANTES de aceitar." },
      { title: "Modelos de Preço", content: `**Por palavra** — Tarifa × ponderada × idiomas. $0.05-0.20.\n**Por hora** — LQA, DTP. $25-80.\n**Fee fixo** — Escopo fechado. Você absorve scope creep.\n**Retainer** — Mensal para live-service.\n\n**Tiers:** FIGS/PTBR (menor) → CJK/Árabe (maior) → Exóticos (maior).`, tip: "Compita por confiabilidade, não preço." },
      { title: "Defesa do Quote", content: `**🚩 Red flags:** Quote pra hoje, sem arquivos, mesma tarifa, refs depois, cobrir concorrente.\n\n**Defesa:**\n► Liste premissas e IN/OUT\n► "Baseado em arquivos de [data]"\n► Cláusula de change order\n► Validade 30 dias\n\n**Margem:** Vendor + PM (10-15%) + Tech (5-10%) + Contingência (5-10%) = meta 30-45%.`, tip: "Bom quote conta uma história." }
    ], quiz: [
      { q: "Unidade CJK?", o: ["Palavras", "Caracteres", "Páginas"], a: 1 },
      { q: "Contagem ponderada?", o: ["Só novas", "TM com desconto + novas", "Total sem ajuste"], a: 1 },
      { q: "Margem saudável?", o: ["10-15%", "30-45%", "50-60%"], a: 1 },
    ], deliverable: "Monte Calculadora de Quote." }

  // ═══ MODULE 5: KICKOFF ═══
  { icon: "🚀", color: "#f778ba",
    en: { title: "KICKOFF", lessons: [
      { title: "Kickoff Meeting", content: `**Who:** Client loc mgr + producer. LSP PM + AM. Max 8.\n\n**Agenda:** Project overview → Scope → Timeline → Tools → References → Comms plan → Risks\n\n**After:** Notes within 24h. List all decisions. Written confirmation. This email = your shield.`, tip: "Your ONE chance to ask all the questions." },
      { title: "Reference Kit", content: `**Style Guide** — Tone, formality, per-language. No guide? Create basics.\n**Glossary** — Key terms, characters, locations. Build from day 1.\n**TM** — Previous translations. Dirty TM = propagated errors.\n**Build** — Playable version. #1 quality differentiator.\n**Art Bible** — Visual identity, world-building.`, tip: "No references from client? YOUR cue to create them." },
      { title: "Query Management", content: `Linguist logs → PM reviews → Escalates to client → Distributes answer to ALL.\n\n**Sheet:** ID/Source/Language/Query/Context/Suggestion/Answer/Status\n\n► Batch 10-20, don't trickle\n► Include context (screenshots!)\n► Suggest an answer\n► SLA: 24-48h, 4h blockers`, tip: "Well-managed queries = #1 quality predictor." },
      { title: "Vendor Briefing", content: `**Include:** Game overview, character guide, context access, style summary, glossary, tech constraints, query process, deadlines.\n\n**Selection:** Gaming experience, availability, quality record, tool proficiency.\n\n**Onboarding:** Small test (500-1K) → Review → Feedback → Full volume.`, tip: "30 min of briefing saves 30 hours of fixes." },
      { title: "Engineering Alignment", content: `**Formats:** XLIFF/JSON/XML/CSV — verify UTF-8.\n**Char limits:** DE +30-35%, CJK -30-50%, AR/HE = RTL.\n**Align:** Delivery method, build schedule, variable protection, placeholder behavior, font support, overflow.\n\n**Pseudo-loc:** Accented chars + 30% padding. Catches UI issues early.`, tip: "Meet engineering ONCE. Put it in writing." }
    ], quiz: [
      { q: "Send within 24h?", o: ["First batch", "Meeting notes + actions", "Final quote"], a: 1 },
      { q: "Pseudo-loc catches?", o: ["Translation errors", "UI layout issues", "Audio sync"], a: 1 },
      { q: "Query batching?", o: ["One at a time", "10-20 together", "End of project"], a: 1 },
    ], deliverable: "Create Kickoff Checklist + Vendor Briefing Template." },
    pt: { title: "KICKOFF", lessons: [
      { title: "Reunião de Kickoff", content: `**Quem:** Loc mgr + produtor do cliente. PM + AM do LSP. Máx 8.\n\n**Agenda:** Visão → Escopo → Cronograma → Ferramentas → Referências → Comunicação → Riscos\n\n**Depois:** Ata em 24h. Liste decisões. Confirmação escrita = seu escudo.`, tip: "Sua ÚNICA chance de perguntar tudo." },
      { title: "Kit de Referência", content: `**Style Guide** — Tom, formalidade, por idioma. Sem guia? Crie.\n**Glossário** — Termos-chave, personagens, locais. Construa desde dia 1.\n**TM** — Traduções anteriores. TM suja = erros propagados.\n**Build** — Versão jogável. Diferenciador #1.\n**Art Bible** — Identidade visual, worldbuilding.`, tip: "Sem referências? Seu sinal pra criar." },
      { title: "Gestão de Queries", content: `Linguista registra → PM revisa → Escala → Distribui a TODOS.\n\n**Planilha:** ID/Fonte/Idioma/Query/Contexto/Sugestão/Resposta/Status\n\n► Agrupe 10-20\n► Inclua contexto (screenshots!)\n► Sugira resposta\n► SLA: 24-48h, 4h blockers`, tip: "Queries bem geridas = maior preditor de qualidade." },
      { title: "Briefing de Vendors", content: `**Inclua:** Visão do jogo, personagens, contexto, style guide, glossário, restrições técnicas, queries, prazos.\n\n**Seleção:** Experiência games, disponibilidade, qualidade, ferramentas.\n\n**Onboarding:** Teste pequeno → Revise → Feedback → Volume.`, tip: "30 min de briefing = 30h de correção economizadas." },
      { title: "Engenharia", content: `**Formatos:** XLIFF/JSON/XML/CSV — verifique UTF-8.\n**Limites:** DE +30-35%, CJK -30-50%, AR/HE = RTL.\n**Alinhe:** Entrega, builds, variáveis, placeholders, fontes, overflow.\n\n**Pseudo-loc:** Acentos + 30% padding. Detecta problemas de UI.`, tip: "Reúna com eng UMA VEZ. Coloque por escrito." }
    ], quiz: [
      { q: "Enviar em 24h?", o: ["Primeiro batch", "Ata + actions", "Quote final"], a: 1 },
      { q: "Pseudo-loc detecta?", o: ["Erros de tradução", "Problemas de UI", "Sync de áudio"], a: 1 },
      { q: "Queries?", o: ["Uma por vez", "10-20 agrupadas", "Fim do projeto"], a: 1 },
    ], deliverable: "Crie Checklist de Kickoff + Template de Briefing." }
